<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skyline — Weather</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,600;1,9..144,400&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --ink: #eef1f6;
    --ink-dim: #aab3c4;
    --night: #0b0f1a;
    --night-2: #131a2b;
    --dusk: #2a3358;
    --ember: #e8a26b;
    --line: rgba(238,241,246,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    background: var(--night);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    overflow: hidden;
  }

  #app {
    position: relative;
    width: 100%;
    height: 100vh;
    background:
      radial-gradient(ellipse 80% 60% at 50% -10%, var(--dusk) 0%, transparent 60%),
      linear-gradient(180deg, var(--night-2) 0%, var(--night) 100%);
    transition: background 1.2s ease;
  }

  /* Stars */
  .stars {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: var(--ink);
    border-radius: 50%;
    opacity: 0.5;
    animation: twinkle 4s ease-in-out infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.15; }
    50% { opacity: 0.75; }
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 32px;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.7s ease;
  }
  .screen.active {
    opacity: 1;
    pointer-events: auto;
  }

  /* ---- Welcome screen ---- */
  .eyebrow {
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ember);
    margin-bottom: 28px;
    font-weight: 600;
  }

  .quote {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(26px, 4vw, 44px);
    line-height: 1.35;
    max-width: 720px;
    color: var(--ink);
    margin-bottom: 18px;
  }

  .quote-attribution {
    font-size: 14px;
    color: var(--ink-dim);
    letter-spacing: 0.04em;
    margin-bottom: 56px;
  }

  .enter-btn {
    background: none;
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.04em;
    padding: 14px 36px;
    border-radius: 999px;
    cursor: pointer;
    transition: border-color 0.3s, background 0.3s;
  }
  .enter-btn:hover {
    border-color: var(--ember);
    background: rgba(232,162,107,0.08);
  }

  /* ---- Search screen ---- */
  .brand-mark {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    position: absolute;
    top: 32px;
    left: 36px;
    letter-spacing: 0.01em;
  }
  .brand-mark span { color: var(--ember); }

  .search-title {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-size: clamp(28px, 5vw, 46px);
    margin-bottom: 36px;
  }

  .search-row {
    display: flex;
    gap: 10px;
    margin-bottom: 16px;
  }

  .city-input {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    color: var(--ink);
    font-family: 'Inter', sans-serif;
    font-size: 16px;
    padding: 14px 20px;
    border-radius: 12px;
    width: 280px;
    outline: none;
    transition: border-color 0.25s;
  }
  .city-input::placeholder { color: var(--ink-dim); }
  .city-input:focus { border-color: var(--ember); }

  .go-btn {
    background: var(--ember);
    border: none;
    color: #1a1208;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    padding: 14px 26px;
    border-radius: 12px;
    cursor: pointer;
    transition: filter 0.2s, transform 0.15s;
  }
  .go-btn:hover { filter: brightness(1.08); }
  .go-btn:active { transform: scale(0.97); }

  .hint {
    font-size: 13px;
    color: var(--ink-dim);
  }

  .status-msg {
    margin-top: 18px;
    font-size: 14px;
    color: var(--ink-dim);
    min-height: 20px;
  }
  .status-msg.error { color: #e88a8a; }

  /* ---- Result screen ---- */
  .result-card {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 48px 56px;
    max-width: 420px;
    backdrop-filter: blur(8px);
  }

  .result-icon {
    font-size: 56px;
    margin-bottom: 6px;
    line-height: 1;
  }

  .result-city {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 500;
    margin-bottom: 4px;
  }

  .result-country {
    font-size: 13px;
    color: var(--ink-dim);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .result-temp {
    font-family: 'Fraunces', serif;
    font-size: 76px;
    font-weight: 300;
    line-height: 1;
    margin-bottom: 6px;
  }
  .result-temp sup { font-size: 32px; top: -0.4em; }

  .result-desc {
    font-size: 16px;
    color: var(--ink-dim);
    margin-bottom: 32px;
    text-transform: capitalize;
  }

  .result-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
    text-align: left;
    border-top: 1px solid var(--line);
    padding-top: 24px;
  }

  .result-stat-label {
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink-dim);
    margin-bottom: 4px;
  }
  .result-stat-value {
    font-size: 18px;
    font-weight: 500;
  }

  .result-actions {
    display: flex;
    gap: 12px;
    margin-top: 32px;
  }

  .text-btn {
    background: none;
    border: none;
    color: var(--ink-dim);
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    cursor: pointer;
    text-decoration: underline;
    text-decoration-color: var(--line);
    transition: color 0.2s;
  }
  .text-btn:hover { color: var(--ink); }

  .text-btn.primary {
    color: var(--ember);
    text-decoration-color: transparent;
  }

  /* ---- Farewell screen ---- */
  .farewell-mark {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: clamp(24px, 4vw, 36px);
    margin-bottom: 20px;
    max-width: 600px;
    line-height: 1.4;
  }
  .farewell-sub {
    font-size: 14px;
    color: var(--ink-dim);
    margin-bottom: 48px;
  }
  .founder-tag {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-dim);
  }
  .founder-name {
    font-family: 'Fraunces', serif;
    font-size: 20px;
    font-weight: 600;
    color: var(--ember);
    margin-top: 8px;
  }

  .loader {
    width: 28px;
    height: 28px;
    border: 2px solid var(--line);
    border-top-color: var(--ember);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 24px auto 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="app">
  <div class="stars" id="stars"></div>

  <!-- Welcome / quote screen -->
  <div class="screen active" id="screen-welcome">
    <div class="eyebrow">Skyline</div>
    <div class="quote" id="quote-text">"Some people feel the rain. Others just get wet."</div>
    <div class="quote-attribution" id="quote-author">— Bob Marley</div>
    <button class="enter-btn" onclick="goTo('search')">Check the sky →</button>
  </div>

  <!-- Search screen -->
  <div class="screen" id="screen-search">
    <div class="brand-mark">Sky<span>line</span></div>
    <div class="search-title">Where are you?</div>
    <div class="search-row">
      <input type="text" class="city-input" id="cityInput" placeholder="Enter a city" autocomplete="off">
      <button class="go-btn" id="goBtn" onclick="fetchWeather()">Check</button>
    </div>
    <div class="hint">Try "Mumbai", "Tokyo", or your own city</div>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <!-- Result screen -->
  <div class="screen" id="screen-result">
    <div class="result-card" id="resultCard"></div>
    <div class="result-actions">
      <button class="text-btn" onclick="goTo('search')">Search another city</button>
      <button class="text-btn primary" onclick="goTo('farewell')">I'm done</button>
    </div>
  </div>

  <!-- Farewell screen -->
  <div class="screen" id="screen-farewell">
    <div class="farewell-mark">Thank you for checking the sky with Skyline.</div>
    <div class="farewell-sub">Go on — it might rain, it might not. Either way, you're ready.</div>
    <div class="founder-tag">Founded by</div>
    <div class="founder-name">Tanishq-zz</div>
    <button class="enter-btn" style="margin-top: 40px;" onclick="goTo('search')">Check another sky</button>
  </div>
</div>

<script>
// ---- API key: set yours below ----
const API_KEY = "069e6d66e449ba68968fb8f4b0863770";

// ---- Quotes for welcome screen ----
const quotes = [
  { text: "Some people feel the rain. Others just get wet.", author: "Bob Marley" },
  { text: "Climate is what we expect, weather is what we get.", author: "Mark Twain" },
  { text: "After the rain, the sun will reappear.", author: "Walt Disney" },
  { text: "Wherever you go, no matter what the weather, always bring your own sunshine.", author: "Anthony J. D'Angelo" },
  { text: "A cloudy day is no match for a sunny disposition.", author: "William Arthur Ward" }
];

function setRandomQuote() {
  const q = quotes[Math.floor(Math.random() * quotes.length)];
  document.getElementById('quote-text').textContent = `"${q.text}"`;
  document.getElementById('quote-author').textContent = `— ${q.author}`;
}
setRandomQuote();

// ---- Starfield ----
const starsContainer = document.getElementById('stars');
for (let i = 0; i < 60; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  s.style.left = Math.random() * 100 + '%';
  s.style.top = Math.random() * 100 + '%';
  s.style.animationDelay = (Math.random() * 4) + 's';
  starsContainer.appendChild(s);
}

// ---- Screen navigation ----
function goTo(screenName) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + screenName).classList.add('active');
  if (screenName === 'search') {
    document.getElementById('statusMsg').textContent = '';
    document.getElementById('statusMsg').className = 'status-msg';
    setTimeout(() => document.getElementById('cityInput').focus(), 300);
  }
}

document.getElementById('cityInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') fetchWeather();
});

// ---- Weather icon mapping ----
function getIcon(main) {
  const map = {
    Clear: '☀️', Clouds: '☁️', Rain: '🌧️', Drizzle: '🌦️',
    Thunderstorm: '⛈️', Snow: '❄️', Mist: '🌫️', Fog: '🌫️',
    Haze: '🌫️', Smoke: '🌫️'
  };
  return map[main] || '🌤️';
}

function applyMood(main) {
  const app = document.getElementById('app');
  const moods = {
    Clear: 'radial-gradient(ellipse 80% 60% at 50% -10%, #3a3560 0%, transparent 60%), linear-gradient(180deg, #161b33 0%, #0b0f1a 100%)',
    Clouds: 'radial-gradient(ellipse 80% 60% at 50% -10%, #2c3242 0%, transparent 60%), linear-gradient(180deg, #131a2b 0%, #0b0f1a 100%)',
    Rain: 'radial-gradient(ellipse 80% 60% at 50% -10%, #1f2b3d 0%, transparent 60%), linear-gradient(180deg, #0e1622 0%, #0b0f1a 100%)',
    Thunderstorm: 'radial-gradient(ellipse 80% 60% at 50% -10%, #241b30 0%, transparent 60%), linear-gradient(180deg, #100c1a 0%, #0b0f1a 100%)'
  };
  app.style.background = moods[main] || moods.Clouds;
}

// ---- Fetch + render weather ----
async function fetchWeather() {
  const city = document.getElementById('cityInput').value.trim();
  const statusMsg = document.getElementById('statusMsg');
  const goBtn = document.getElementById('goBtn');

  if (!city) {
    statusMsg.textContent = 'Type a city name first.';
    statusMsg.className = 'status-msg error';
    return;
  }

  statusMsg.textContent = '';
  statusMsg.className = 'status-msg';
  goBtn.disabled = true;
  goBtn.textContent = '...';

  try {
    const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(city)}&appid=${API_KEY}&units=metric`;
    const res = await fetch(url);
    const data = await res.json();

    if (!res.ok) {
      statusMsg.textContent = data.message ? data.message.charAt(0).toUpperCase() + data.message.slice(1) : 'City not found.';
      statusMsg.className = 'status-msg error';
      goBtn.disabled = false;
      goBtn.textContent = 'Check';
      return;
    }

    renderResult(data);
    applyMood(data.weather[0].main);
    goTo('result');
  } catch (err) {
    statusMsg.textContent = 'Could not reach the weather service. Check your connection.';
    statusMsg.className = 'status-msg error';
  }

  goBtn.disabled = false;
  goBtn.textContent = 'Check';
}

function renderResult(data) {
  const icon = getIcon(data.weather[0].main);
  const card = document.getElementById('resultCard');
  card.innerHTML = `
    <div class="result-icon">${icon}</div>
    <div class="result-city">${data.name}</div>
    <div class="result-country">${data.sys.country}</div>
    <div class="result-temp">${Math.round(data.main.temp)}<sup>°C</sup></div>
    <div class="result-desc">${data.weather[0].description}</div>
    <div class="result-grid">
      <div>
        <div class="result-stat-label">Feels like</div>
        <div class="result-stat-value">${Math.round(data.main.feels_like)}°C</div>
      </div>
      <div>
        <div class="result-stat-label">Humidity</div>
        <div class="result-stat-value">${data.main.humidity}%</div>
      </div>
      <div>
        <div class="result-stat-label">Wind</div>
        <div class="result-stat-value">${data.wind.speed} m/s</div>
      </div>
      <div>
        <div class="result-stat-label">Pressure</div>
        <div class="result-stat-value">${data.main.pressure} hPa</div>
      </div>
    </div>
  `;
}
</script>

</body>
</html>
